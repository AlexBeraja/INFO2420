<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Extreme Honeymoons</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{
      --main: #0AC1BA;
      --accent: #3027CF;
      --highlight: #192525;
      --bg: #1f1e2a;
      --text: #6EA237;
    }
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: white;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    .frame{
      background: #00000055;
      border: 4px solid var(--accent);
      padding: 12px;
      max-width: 740px;
    }
    h1{
      margin-top: 0;
      color: var(--main);
    }
    figure{
      margin: 0;
    }
    figcaption{
      color: var(--text);
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="frame">
    <h1>Welcome to Extreme Honeymoons</h1>

    <figure>
      <img src="Images/mymap.jpg" 
           alt="Composite imagemap graphic with five labeled areas: Home, About Us, Tributes, Customer Survey, Favorite Links"
           width="700">
    </figure>
  </div>

</body>
</html>
