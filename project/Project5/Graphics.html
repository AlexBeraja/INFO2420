<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Extreme Honeymoons - Graphics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root{
      --main: #0AC1BA;
      --accent: #3027CF;
      --highlight: #192525;
      --bg: #1f1e2a;
      --text: #6EA237;
    }
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: white;
    }
    header{
      background: var(--highlight);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 4px solid var(--accent);
    }
    header img{
      display: block;
    }
    main{
      padding: 16px;
    }
    figure{
      margin: 0 0 24px 0;
    }
    figcaption{
      color: var(--text);
      font-size: 0.95rem;
    }
    .note{
      background: #00000055;
      padding: 12px;
      border-left: 4px solid var(--main);
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <header>
    <img src="Images/logo.png"
         alt="Extreme Honeymoons logo"
         width="140" height="160">

    <img src="Images/banner.png"
         alt="Extreme Honeymoons banner"
         width="550" height="160">
  </header>

  <main>
    <h1>Project 5 Graphics</h1>

    <figure>
      <img src="Images/logo.png" alt="Logo image" width="140" height="160">
    </figure>

    <figure>
      <img src="Images/banner.png" alt="Banner image" width="550" height="160">
    </figure>
  </main>


</body>
</html>
